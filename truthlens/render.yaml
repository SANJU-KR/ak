services:
  - type: web
    name: news-credibility-analysis
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python model/train_model.py"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: NEWS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "False"
